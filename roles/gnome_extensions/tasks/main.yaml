---
- name: Check if gnome-extensions-cli is functional
  ansible.builtin.command:
    cmd: "gnome-extensions-cli --version"
  register: gec_check
  failed_when: false
  changed_when: false
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Install gnome-extensions-cli using pipx
  community.general.pipx:
    name: gnome-extensions-cli
    state: "{{ 'reinstall' if gec_check.rc != 0 else 'present' }}"
    executable: pipx

- name: Install system-monitor-next dependencies
  become: true
  ansible.builtin.apt:
    name: gir1.2-gtop-2.0
    state: present

- name: Install GNOME Shell extensions using gnome-extensions-cli
  ansible.builtin.command:
    cmd: "gnome-extensions-cli install {{ item }}"
  loop: "{{ gnome_extensions.packages }}"
  loop_control:
    label: "{{ item }}"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"
  register: extension_install_result
  changed_when: "'already installed' not in extension_install_result.stdout"

- name: Compile schemas for Caffeine extension (if required)
  ansible.builtin.command:
    cmd: "glib-compile-schemas {{ xdg_data_home }}/gnome-shell/extensions/caffeine@patapon.info/schemas"
    creates: "{{ xdg_data_home }}/gnome-shell/extensions/caffeine@patapon.info/schemas/gschemas.compiled"
  when: "'caffeine@patapon.info' in gnome_extensions.packages"

- name: Compile schemas for Night Theme Switcher extension (if required)
  ansible.builtin.command:
    cmd: "glib-compile-schemas {{ xdg_data_home }}/gnome-shell/extensions/nightthemeswitcher@romainvigier.fr/schemas"
    creates: "{{ xdg_data_home }}/gnome-shell/extensions/nightthemeswitcher@romainvigier.fr/schemas/gschemas.compiled"
  when: "'nightthemeswitcher@romainvigier.fr' in gnome_extensions.packages"

- name: Get Night Theme Switcher sunrise setting
  ansible.builtin.command:
    cmd: "gsettings --schemadir {{ xdg_data_home }}/gnome-shell/extensions/nightthemeswitcher@romainvigier.fr/schemas get org.gnome.shell.extensions.nightthemeswitcher.time sunrise"
  register: nightthemeswitcher_sunrise
  when: "'nightthemeswitcher@romainvigier.fr' in gnome_extensions.packages"
  changed_when: false

- name: Set Night Theme Switcher sunrise to 7:00
  ansible.builtin.command:
    cmd: "gsettings --schemadir {{ xdg_data_home }}/gnome-shell/extensions/nightthemeswitcher@romainvigier.fr/schemas set org.gnome.shell.extensions.nightthemeswitcher.time sunrise 7.0"
  when: "'nightthemeswitcher@romainvigier.fr' in gnome_extensions.packages and nightthemeswitcher_sunrise.stdout != '7.0'"
  changed_when: nightthemeswitcher_sunrise.stdout != '7.0'

- name: Get Night Theme Switcher sunset setting
  ansible.builtin.command:
    cmd: "gsettings --schemadir {{ xdg_data_home }}/gnome-shell/extensions/nightthemeswitcher@romainvigier.fr/schemas get org.gnome.shell.extensions.nightthemeswitcher.time sunset"
  register: nightthemeswitcher_sunset
  when: "'nightthemeswitcher@romainvigier.fr' in gnome_extensions.packages"
  changed_when: false

- name: Set Night Theme Switcher sunset to 21:00
  ansible.builtin.command:
    cmd: "gsettings --schemadir {{ xdg_data_home }}/gnome-shell/extensions/nightthemeswitcher@romainvigier.fr/schemas set org.gnome.shell.extensions.nightthemeswitcher.time sunset 21.0"
  when: "'nightthemeswitcher@romainvigier.fr' in gnome_extensions.packages and nightthemeswitcher_sunset.stdout != '21.0'"
  changed_when: nightthemeswitcher_sunset.stdout != '21.0'

- name: Get system-monitor-next current settings
  ansible.builtin.command:
    cmd: "gsettings --schemadir {{ xdg_data_home }}/gnome-shell/extensions/system-monitor-next@paradoxxx.zero.gmail.com/schemas get org.gnome.shell.extensions.system-monitor {{ item.key }}"
  loop: "{{ system_monitor_next_settings }}"
  loop_control:
    label: "{{ item.key }}"
  register: system_monitor_current
  when: "'system-monitor-next@paradoxxx.zero.gmail.com' in gnome_extensions.packages"
  changed_when: false

- name: Set system-monitor-next settings
  ansible.builtin.command:
    cmd: "gsettings --schemadir {{ xdg_data_home }}/gnome-shell/extensions/system-monitor-next@paradoxxx.zero.gmail.com/schemas set org.gnome.shell.extensions.system-monitor {{ item.0.key }} {{ item.0.value }}"
  loop: "{{ system_monitor_next_settings | zip(system_monitor_current.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.key }}"
  when: "'system-monitor-next@paradoxxx.zero.gmail.com' in gnome_extensions.packages and item.1.stdout.split()[-1] != item.0.value"
  changed_when: item.1.stdout.split()[-1] != item.0.value
