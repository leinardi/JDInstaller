---
- name: "OrcaSlicer | Validate configuration"
  ansible.builtin.assert:
    that:
      - orcaslicer_appimage is mapping
      - orcaslicer_appimage.github_repo is defined
      - (orcaslicer_appimage.github_repo | length) > 0
      - orcaslicer_appimage.distro_tag is defined
      - (orcaslicer_appimage.distro_tag | length) > 0
      - orcaslicer_appimage.install_dir is defined
      - (orcaslicer_appimage.install_dir | length) > 0
      - orcaslicer_appimage.bin_symlink is defined
      - (orcaslicer_appimage.bin_symlink | length) > 0
      - orcaslicer_appimage.nightly is defined
      - orcaslicer_appimage.force_reinstall is defined
      - orcaslicer_appimage.version is defined
      - (orcaslicer_appimage.version | length) > 0
      - orcaslicer_appimage_tmp_dir is defined
      - (orcaslicer_appimage_tmp_dir | length) > 0
    fail_msg: "Invalid or incomplete OrcaSlicer AppImage role configuration."

- name: "OrcaSlicer | Normalize force_reinstall flag"
  ansible.builtin.set_fact:
    _orcaslicer_ai_force_reinstall: "{{ (orcaslicer_appimage.force_reinstall | default(false)) | bool }}"
  changed_when: false

- name: "OrcaSlicer | Check whether OrcaSlicer binary is already installed"
  ansible.builtin.stat:
    path: "{{ orcaslicer_appimage.install_dir }}/bin/orca-slicer"
  register: _orcaslicer_ai_binary_stat
  changed_when: false

- name: "OrcaSlicer | Decide whether to install"
  ansible.builtin.set_fact:
    _orcaslicer_ai_is_installed: "{{ _orcaslicer_ai_binary_stat.stat.exists }}"
    _orcaslicer_ai_do_install: "{{ (not _orcaslicer_ai_binary_stat.stat.exists) or _orcaslicer_ai_force_reinstall }}"
  changed_when: false

- name: "OrcaSlicer | Get installed version string"
  ansible.builtin.command:
    cmd: "{{ orcaslicer_appimage.install_dir }}/bin/orca-slicer -h"
  register: _orcaslicer_ai_version_output
  changed_when: false
  failed_when: false
  when:
    - _orcaslicer_ai_is_installed
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version != "latest"

- name: "OrcaSlicer | Parse installed version"
  ansible.builtin.set_fact:
    _orcaslicer_ai_installed_version: >-
      {{
        (
          (_orcaslicer_ai_version_output.stdout_lines | default([]))
          + (_orcaslicer_ai_version_output.stderr_lines | default([]))
        )
        | select('match', '^OrcaSlicer-')
        | list
        | first
        | default('')
        | regex_replace('^OrcaSlicer-(.+):$', '\1')
      }}
  changed_when: false
  when:
    - _orcaslicer_ai_is_installed
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version != "latest"

- name: "OrcaSlicer | Normalize desired version (strip leading v)"
  ansible.builtin.set_fact:
    _orcaslicer_ai_desired_version: >-
      {{
        (orcaslicer_appimage.version | string)
        | regex_replace('^v', '')
      }}
  changed_when: false
  when:
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version != "latest"

- name: "OrcaSlicer | Decide whether version mismatch requires reinstall"
  ansible.builtin.set_fact:
    _orcaslicer_ai_do_install: >-
      {{
        _orcaslicer_ai_do_install
        or (
          _orcaslicer_ai_is_installed
          and (_orcaslicer_ai_installed_version | default('')) != _orcaslicer_ai_desired_version
        )
      }}
    _orcaslicer_ai_version_mismatch: >-
      {{
        _orcaslicer_ai_is_installed
        and (_orcaslicer_ai_installed_version | default('')) != _orcaslicer_ai_desired_version
      }}
  changed_when: false
  when:
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version != "latest"

- name: "OrcaSlicer | Remove install dir (force reinstall or version mismatch)"
  become: true
  ansible.builtin.file:
    path: "{{ orcaslicer_appimage.install_dir }}"
    state: absent
  when:
    - _orcaslicer_ai_is_installed
    - _orcaslicer_ai_force_reinstall or (_orcaslicer_ai_version_mismatch | default(false))

- name: "OrcaSlicer | Ensure temporary directory exists"
  ansible.builtin.file:
    path: "{{ orcaslicer_appimage_tmp_dir }}"
    state: directory
    mode: "0755"
  when: _orcaslicer_ai_do_install

# -------------------------
# Nightly bundle selection
# -------------------------
- name: "OrcaSlicer | Nightly - fetch releases list"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ orcaslicer_appimage.github_repo }}/releases"
    return_content: true
    headers:
      Accept: "application/vnd.github+json"
  register: _orcaslicer_releases_resp
  when:
    - _orcaslicer_ai_do_install
    - orcaslicer_appimage.nightly | bool
  changed_when: false

- name: "OrcaSlicer | Nightly - extract tag/assets from most recent prerelease"
  ansible.builtin.set_fact:
    _orcaslicer_release_tag: >-
      {{
        (
          (_orcaslicer_releases_resp.json | default([]))
          | selectattr('prerelease', 'equalto', true)
          | map(attribute='tag_name')
          | list
          | first
        ) | default('unknown')
      }}
    _orcaslicer_release_assets: >-
      {{
        (
          (_orcaslicer_releases_resp.json | default([]))
          | selectattr('prerelease', 'equalto', true)
          | map(attribute='assets')
          | list
          | first
        ) | default([])
      }}
  when:
    - _orcaslicer_ai_do_install
    - orcaslicer_appimage.nightly | bool
  changed_when: false

# -------------------------
# Stable bundle selection
# -------------------------
- name: "OrcaSlicer | Stable - compute tag for pinned versions"
  ansible.builtin.set_fact:
    _orcaslicer_version_tag: "{{ (orcaslicer_appimage.version if (orcaslicer_appimage.version | string).startswith('v') else ('v' ~ (orcaslicer_appimage.version | string))) }}"
  when:
    - _orcaslicer_ai_do_install
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version != "latest"
  changed_when: false

- name: "OrcaSlicer | Stable - fetch release JSON (latest)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ orcaslicer_appimage.github_repo }}/releases/latest"
    return_content: true
    headers:
      Accept: "application/vnd.github+json"
  register: _orcaslicer_release_latest_resp
  when:
    - _orcaslicer_ai_do_install
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version == "latest"
  changed_when: false

- name: "OrcaSlicer | Stable - fetch release JSON (pinned tag)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ orcaslicer_appimage.github_repo }}/releases/tags/{{ _orcaslicer_version_tag }}"
    return_content: true
    headers:
      Accept: "application/vnd.github+json"
  register: _orcaslicer_release_pinned_resp
  when:
    - _orcaslicer_ai_do_install
    - not (orcaslicer_appimage.nightly | bool)
    - orcaslicer_appimage.version != "latest"
  changed_when: false

- name: "OrcaSlicer | Stable - select release JSON object"
  ansible.builtin.set_fact:
    _orcaslicer_release_json: >-
      {{
        (_orcaslicer_release_latest_resp.json
          if orcaslicer_appimage.version == "latest"
          else _orcaslicer_release_pinned_resp.json)
        | default({})
      }}
  when:
    - _orcaslicer_ai_do_install
    - not (orcaslicer_appimage.nightly | bool)
  changed_when: false

- name: "OrcaSlicer | Stable - extract tag/assets from release response"
  ansible.builtin.set_fact:
    _orcaslicer_release_tag: "{{ _orcaslicer_release_json.tag_name | default('unknown') }}"
    _orcaslicer_release_assets: "{{ _orcaslicer_release_json.assets | default([]) }}"
  when:
    - _orcaslicer_ai_do_install
    - not (orcaslicer_appimage.nightly | bool)
  changed_when: false

# -------------------------
# Asset selection (both)
# -------------------------
- name: "OrcaSlicer | Pick AppImage asset from release"
  ansible.builtin.set_fact:
    _orcaslicer_ai_asset: >-
      {{
        (
          _orcaslicer_release_assets
          | selectattr('name', 'search', '\.AppImage$')
          | selectattr('name', 'search', orcaslicer_appimage.distro_tag)
          | list
          | first
        ) | default({})
      }}
  when: _orcaslicer_ai_do_install
  changed_when: false

- name: "OrcaSlicer | Fail if AppImage asset not found"
  ansible.builtin.fail:
    msg: >-
      Could not find an .AppImage asset matching distro_tag '{{ orcaslicer_appimage.distro_tag }}' for this release.
      Release: {{ _orcaslicer_release_tag }}
      Nightly: {{ orcaslicer_appimage.nightly | bool }}
      Repo: {{ orcaslicer_appimage.github_repo }}
  when:
    - _orcaslicer_ai_do_install
    - (_orcaslicer_ai_asset | length) == 0 or (_orcaslicer_ai_asset.browser_download_url is not defined)

- name: "OrcaSlicer | Set AppImage URL and local path"
  ansible.builtin.set_fact:
    _orcaslicer_ai_url: "{{ _orcaslicer_ai_asset.browser_download_url }}"
    _orcaslicer_ai_local_path: "{{ orcaslicer_appimage_tmp_dir }}/{{ _orcaslicer_ai_asset.name }}"
  when: _orcaslicer_ai_do_install
  changed_when: false

- name: "OrcaSlicer | Download AppImage"
  ansible.builtin.get_url:
    url: "{{ _orcaslicer_ai_url }}"
    dest: "{{ _orcaslicer_ai_local_path }}"
    mode: "0644"
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Ensure install dir exists"
  become: true
  ansible.builtin.file:
    path: "{{ orcaslicer_appimage.install_dir }}"
    state: directory
    mode: "0755"
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Make AppImage executable"
  ansible.builtin.file:
    path: "{{ _orcaslicer_ai_local_path }}"
    mode: "0755"
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Extract AppImage"
  become: true
  ansible.builtin.command:
    cmd: "{{ _orcaslicer_ai_local_path }} --appimage-extract"
  args:
    chdir: "{{ orcaslicer_appimage.install_dir }}"
    creates: "{{ orcaslicer_appimage.install_dir }}/squashfs-root"
  when: _orcaslicer_ai_do_install
  notify:
    - Move OrcaSlicer extracted payload into place

- name: "OrcaSlicer | Flush handlers"
  ansible.builtin.meta: flush_handlers

- name: "OrcaSlicer | Remove temporary squashfs-root"
  become: true
  ansible.builtin.file:
    path: "{{ orcaslicer_appimage.install_dir }}/squashfs-root"
    state: absent
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Fix permissions of installed AppDir"
  become: true
  ansible.builtin.file:
    path: "{{ orcaslicer_appimage.install_dir }}"
    mode: "u=rwX,g=rX,o=rX"
    recurse: true
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Install desktop entry"
  become: true
  ansible.builtin.template:
    src: orcaslicer.desktop.j2
    dest: /usr/share/applications/orcaslicer.desktop
    mode: "0644"
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Check for hicolor icon"
  ansible.builtin.stat:
    path: "{{ orcaslicer_appimage.install_dir }}/usr/share/icons/hicolor/192x192/apps/OrcaSlicer.png"
  register: _orcaslicer_icon_stat
  changed_when: false
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Install icon"
  become: true
  ansible.builtin.copy:
    src: "{{ orcaslicer_appimage.install_dir }}/usr/share/icons/hicolor/192x192/apps/OrcaSlicer.png"
    dest: "/usr/share/icons/hicolor/192x192/apps/orcaslicer.png"
    remote_src: true
    mode: "0644"
  when:
    - _orcaslicer_ai_do_install
    - _orcaslicer_icon_stat.stat.exists | default(false)

- name: "OrcaSlicer | Refresh icon cache"
  become: true
  ansible.builtin.command:
    cmd: gtk-update-icon-cache -f /usr/share/icons/hicolor
  changed_when: false
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Update desktop database"
  become: true
  ansible.builtin.command: update-desktop-database
  changed_when: false
  failed_when: false
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Create bin symlink"
  become: true
  ansible.builtin.file:
    src: "{{ orcaslicer_appimage.install_dir }}/bin/orca-slicer"
    dest: "{{ orcaslicer_appimage.bin_symlink }}"
    state: link
    force: true
  when: _orcaslicer_ai_do_install

- name: "OrcaSlicer | Cleanup temporary directory"
  ansible.builtin.file:
    path: "{{ orcaslicer_appimage_tmp_dir }}"
    state: absent
  when: _orcaslicer_ai_do_install
