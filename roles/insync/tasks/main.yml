---
- name: Add Insync repository
  become: true
  ansible.builtin.deb822_repository:
    name: insync
    types: deb
    uris: http://apt.insync.io/ubuntu
    suites: "{{ ansible_distribution_release }}"
    components: contrib non-free
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xACCAF35C

- name: Install Insync
  become: true
  ansible.builtin.apt:
    name: insync
    state: present
    update_cache: true

- name: Remove Insync-added inotify watches block (handled by inotify_watches role)
  become: true
  ansible.builtin.blockinfile:
    path: /etc/sysctl.d/99-sysctl.conf
    block: |
      # added by Insync
      fs.inotify.max_user_watches=1048576
    state: absent
    marker: "# {mark} Managed by Ansible - inotify_watches role takes care of this"
